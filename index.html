<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lynn AI</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0;
      --text-muted: rgba(240,240,240,0.4);
      --accent: #a8b8ff;
      --accent-dim: rgba(168,184,255,0.12);
      --user-bg: #1c1c2e;
      --radius: 14px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Auth screen ─────────────────────────────────── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: 32px;
      padding: 24px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .brand {
      text-align: center;
      margin-bottom: 8px;
    }

    .brand h1 {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--text);
    }

    .brand p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 0.04em;
    }

    .auth-tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 10px;
      padding: 3px;
    }

    .auth-tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 13px;
      cursor: pointer;
      border-radius: 8px;
      color: var(--text-muted);
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      font-family: var(--font);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text-muted); }

    .btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-family: var(--font);
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: #0a0a18;
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .auth-error {
      font-size: 13px;
      color: #ff7b7b;
      text-align: center;
      display: none;
    }

    /* ── App layout ──────────────────────────────────── */
    #app { display: none; width: 100%; height: 100vh; }

    /* ── Sidebar ─────────────────────────────────────── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .sidebar-header {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-title {
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--text);
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 30px;
      height: 30px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .icon-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    #conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    #conversation-list::-webkit-scrollbar { width: 4px; }
    #conversation-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .conv-item {
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-muted);
      transition: all 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .conv-item:hover { background: var(--surface2); color: var(--text); }
    .conv-item.active { background: var(--accent-dim); color: var(--accent); }

    .conv-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; }

    .conv-delete {
      opacity: 0;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 0 2px;
      flex-shrink: 0;
      transition: opacity 0.15s, color 0.15s;
    }

    .conv-item:hover .conv-delete { opacity: 1; }
    .conv-delete:hover { color: #ff7b7b; }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .user-email {
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    /* ── Main chat area ───────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #chat-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #chat-title {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
      flex: 1;
      letter-spacing: 0.04em;
    }

    .search-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    .search-toggle input[type="checkbox"] { accent-color: var(--accent); }
    .search-toggle:hover { color: var(--text); }

    /* ── Messages ────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex;
      padding: 6px 24px;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { justify-content: flex-end; }

    .msg-bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.user .msg-bubble {
      background: var(--user-bg);
      color: var(--text);
      border-bottom-right-radius: 4px;
    }

    .msg-row.assistant .msg-bubble {
      background: transparent;
      color: var(--text);
      padding-left: 0;
    }

    .msg-sources {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .source-chip {
      font-size: 11px;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(168,184,255,0.2);
      border-radius: 6px;
      padding: 3px 8px;
      text-decoration: none;
      white-space: nowrap;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity 0.15s;
    }

    .source-chip:hover { opacity: 0.7; }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
    }

    #empty-state h2 {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--text);
    }

    #empty-state p { font-size: 13px; }

    /* Typing indicator */
    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 24px;
    }

    .typing span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.9); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── Input area ──────────────────────────────────── */
    #input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within { border-color: rgba(168,184,255,0.3); }

    #msg-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      resize: none;
      outline: none;
      max-height: 160px;
      line-height: 1.5;
      padding: 3px 0;
    }

    #msg-input::placeholder { color: var(--text-muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      color: #0a0a18;
      width: 34px;
      height: 34px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
    }

    #send-btn:hover { opacity: 0.85; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .input-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: center;
    }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 600px) {
      #sidebar { display: none; }
    }
  </style>
</head>
<body>

<!-- ───────────────────────── Auth Screen ───────────────────────── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="brand">
      <h1>LYNN</h1>
      <p>Intelligent. Calm. Always here.</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Sign in</div>
      <div class="auth-tab" onclick="switchTab('signup')">Create account</div>
    </div>

    <input type="email" id="auth-email" placeholder="Email" autocomplete="email" />
    <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" />

    <p class="auth-error" id="auth-error"></p>

    <button class="btn btn-primary" id="auth-btn" onclick="handleAuth()">Sign in</button>
  </div>
</div>

<!-- ───────────────────────── Main App ───────────────────────── -->
<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">LYNN</span>
      <button class="icon-btn" title="New conversation" onclick="newConversation()">+</button>
    </div>

    <div id="conversation-list"></div>

    <div class="sidebar-footer">
      <span class="user-email" id="user-email"></span>
      <button class="icon-btn" title="Sign out" onclick="signOut()">↪</button>
    </div>
  </div>

  <!-- Chat -->
  <div id="main">
    <div id="chat-header">
      <span id="chat-title">New conversation</span>
      <label class="search-toggle" title="Search the web for up-to-date answers">
        <input type="checkbox" id="use-search" />
        Web search
      </label>
    </div>

    <div id="messages">
      <div id="empty-state">
        <h2>Lynn</h2>
        <p>Ask me anything.</p>
      </div>
    </div>

    <div id="input-area">
      <div class="input-wrap">
        <textarea
          id="msg-input"
          placeholder="Message Lynn…"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button id="send-btn" onclick="sendMessage()" title="Send">
          ↑
        </button>
      </div>
      <p class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// CONFIGURATION — update these two values
// ─────────────────────────────────────────────────────────────
const SUPABASE_URL  = "https://YOUR_PROJECT_REF.supabase.co";  // ← your Supabase project URL
const SUPABASE_ANON = "YOUR_SUPABASE_ANON_KEY";                // ← your Supabase anon/public key
const API_BASE      = "/api";                                   // ← your Lynn AI backend URL
// ─────────────────────────────────────────────────────────────

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser       = null;
let currentConversationId = null;
let authMode          = "login";

// ── Auth ─────────────────────────────────────────────────────
function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll(".auth-tab").forEach((t, i) => {
    t.classList.toggle("active", (mode === "login" ? i === 0 : i === 1));
  });
  document.getElementById("auth-btn").textContent =
    mode === "login" ? "Sign in" : "Create account";
  document.getElementById("auth-error").style.display = "none";
}

async function handleAuth() {
  const email    = document.getElementById("auth-email").value.trim();
  const password = document.getElementById("auth-password").value;
  const btn      = document.getElementById("auth-btn");
  const errEl    = document.getElementById("auth-error");

  if (!email || !password) {
    showAuthError("Please enter your email and password.");
    return;
  }

  btn.disabled = true;
  btn.textContent = authMode === "login" ? "Signing in…" : "Creating account…";
  errEl.style.display = "none";

  try {
    let result;
    if (authMode === "login") {
      result = await sb.auth.signInWithPassword({ email, password });
    } else {
      result = await sb.auth.signUp({ email, password });
    }

    if (result.error) {
      showAuthError(result.error.message);
    } else if (authMode === "signup" && !result.data.session) {
      showAuthError("Check your email to confirm your account, then sign in.");
    }
    // Session change handled by onAuthStateChange below
  } catch (e) {
    showAuthError("Something went wrong. Please try again.");
  } finally {
    btn.disabled = false;
    btn.textContent = authMode === "login" ? "Sign in" : "Create account";
  }
}

function showAuthError(msg) {
  const el = document.getElementById("auth-error");
  el.textContent = msg;
  el.style.display = "block";
}

async function signOut() {
  await sb.auth.signOut();
}

// Watch auth state and show the right screen
sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    currentUser = session.user;
    document.getElementById("auth-screen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    document.getElementById("user-email").textContent = currentUser.email;
    await loadConversations();
  } else {
    currentUser = null;
    currentConversationId = null;
    document.getElementById("auth-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});

// ── Helpers ───────────────────────────────────────────────────
async function getToken() {
  const { data } = await sb.auth.getSession();
  return data?.session?.access_token ?? "";
}

async function apiFetch(path, options = {}) {
  const token = await getToken();
  const res = await fetch(API_BASE + path, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`,
      ...(options.headers ?? {}),
    },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `Request failed (${res.status})`);
  }
  return res.json();
}

// ── Conversations ─────────────────────────────────────────────
async function loadConversations() {
  try {
    const { conversations } = await apiFetch("/conversations");
    renderConversationList(conversations);
  } catch (e) {
    console.error("Failed to load conversations", e);
  }
}

function renderConversationList(conversations) {
  const list = document.getElementById("conversation-list");
  list.innerHTML = "";

  if (!conversations.length) {
    list.innerHTML = `<p style="font-size:12px;color:var(--text-muted);padding:16px;text-align:center;">No conversations yet</p>`;
    return;
  }

  conversations.forEach(conv => {
    const el = document.createElement("div");
    el.className = "conv-item" + (conv.id === currentConversationId ? " active" : "");
    el.dataset.id = conv.id;
    el.innerHTML = `
      <span>${escapeHtml(conv.title)}</span>
      <button class="conv-delete" onclick="deleteConversation(event, '${conv.id}')" title="Delete">✕</button>
    `;
    el.addEventListener("click", (e) => {
      if (!e.target.classList.contains("conv-delete")) {
        openConversation(conv.id, conv.title);
      }
    });
    list.appendChild(el);
  });
}

async function openConversation(id, title) {
  currentConversationId = id;
  document.getElementById("chat-title").textContent = title;

  // Update sidebar active state
  document.querySelectorAll(".conv-item").forEach(el => {
    el.classList.toggle("active", el.dataset.id === id);
  });

  // Load and render messages
  try {
    const { messages } = await apiFetch(`/conversations/${id}`);
    renderMessages(messages);
  } catch (e) {
    console.error("Failed to open conversation", e);
  }
}

function renderMessages(messages) {
  const container = document.getElementById("messages");
  container.innerHTML = "";

  if (!messages.length) {
    container.innerHTML = `
      <div id="empty-state">
        <h2>Lynn</h2>
        <p>Ask me anything.</p>
      </div>`;
    return;
  }

  messages.forEach(msg => appendMessage(msg.role, msg.content, msg.sources));
  container.scrollTop = container.scrollHeight;
}

async function newConversation() {
  currentConversationId = null;
  document.getElementById("chat-title").textContent = "New conversation";
  document.querySelectorAll(".conv-item").forEach(el => el.classList.remove("active"));
  document.getElementById("messages").innerHTML = `
    <div id="empty-state">
      <h2>Lynn</h2>
      <p>Ask me anything.</p>
    </div>`;
}

async function deleteConversation(e, id) {
  e.stopPropagation();
  try {
    await apiFetch(`/conversations/${id}`, { method: "DELETE" });
    if (currentConversationId === id) newConversation();
    await loadConversations();
  } catch (err) {
    alert("Could not delete conversation.");
  }
}

// ── Messaging ─────────────────────────────────────────────────
function appendMessage(role, content, sources) {
  // Remove empty state if present
  const empty = document.getElementById("empty-state");
  if (empty) empty.remove();

  const container = document.getElementById("messages");

  const row = document.createElement("div");
  row.className = `msg-row ${role}`;

  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.textContent = content;

  // Show web sources as clickable chips
  if (sources && sources.length) {
    const sourcesEl = document.createElement("div");
    sourcesEl.className = "msg-sources";
    sources.slice(0, 4).forEach(s => {
      const chip = document.createElement("a");
      chip.className = "source-chip";
      chip.href = s.url;
      chip.target = "_blank";
      chip.rel = "noopener";
      chip.textContent = s.title || s.url;
      chip.title = s.url;
      sourcesEl.appendChild(chip);
    });
    bubble.appendChild(sourcesEl);
  }

  row.appendChild(bubble);
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById("messages");
  const el = document.createElement("div");
  el.id = "typing-indicator";
  el.className = "typing";
  el.innerHTML = "<span></span><span></span><span></span>";
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById("msg-input");
  const message = input.value.trim();
  if (!message) return;

  const useSearch = document.getElementById("use-search").checked;
  const sendBtn = document.getElementById("send-btn");

  // Clear input and disable send
  input.value = "";
  autoResize(input);
  sendBtn.disabled = true;

  // Show user message immediately
  appendMessage("user", message);
  showTyping();

  try {
    const data = await apiFetch("/chat", {
      method: "POST",
      body: JSON.stringify({
        message,
        conversationId: currentConversationId || undefined,
        useSearch,
      }),
    });

    hideTyping();

    // Track the conversation ID from the response
    if (!currentConversationId) {
      currentConversationId = data.conversationId;
      // Refresh the sidebar to show the new conversation
      await loadConversations();
      // Highlight it
      document.querySelectorAll(".conv-item").forEach(el => {
        el.classList.toggle("active", el.dataset.id === currentConversationId);
      });
    }

    appendMessage("assistant", data.message.content, data.message.sources);

  } catch (err) {
    hideTyping();
    appendMessage("assistant", "Something went wrong. Please try again.");
    console.error(err);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

// ── UI helpers ────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 160) + "px";
}

function escapeHtml(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
